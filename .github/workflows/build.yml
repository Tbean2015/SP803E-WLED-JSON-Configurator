name: Build Mac App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - run: pip install pyinstaller

      - run: |
          pyinstaller --windowed --name WLED-Config-Individual-MacOS WLED-Config-Individual.py

      - uses: actions/upload-artifact@v4
        with:
          name: mac-app
          path: dist/
